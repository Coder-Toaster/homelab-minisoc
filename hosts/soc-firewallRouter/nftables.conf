
########################
# Interfaces / Links
########################
define LAN_ETH   = "eth0"              # Untagged lan for adoping unifi devices
define WAN_IF    = "enx00e04c680469"   # Internet/WAN uplink

define VLAN10_IF = "vlan10"            # Management / default
define VLAN20_IF = "vlan20"            # Smart home
define VLAN30_IF = "vlan30"            # Home lab
define VLAN40_IF = "vlan40"            # NAS

########################
# Subnets
########################
define LAN_NET   = 10.0.1.0/24

define VLAN10_NET = 10.0.10.0/24
define VLAN20_NET = 10.0.20.0/27
define VLAN30_NET = 10.0.30.0/28
define VLAN40_NET = 10.0.40.0/28

########################
# Hosts (static IPs)
########################
# VLAN10
define MGMT_PC   = 10.0.10.49
define BL_P2S    = 10.0.10.10

# VLAN20
define HA        = 10.0.20.10

# VLAN30
define ST_Int    		= 10.0.30.2
define ST_Pub    		= 10.0.30.3
define MEDIASERVER 		= 10.0.30.7
define JELLY_COCKPIT	= 10.0.30.8
define SERVAR			= 10.0.30.10

# VLAN40
define NAS       		= 10.0.40.2
# define NAS_ALT	 	= 10.0.40.11 

table inet filter {

  chain input {
    type filter hook input priority 0;
    policy drop;

    # Always allow loopback + established
    iif "lo" accept
    ct state { established, related } accept

    # Allow ICMP to the router itself
    ip protocol icmp accept

    # Router management services from VLAN10 only
    iifname $VLAN10_IF tcp dport { 22, 3000 } accept

    # DHCP to router (clients -> server)
    iifname { $VLAN10_IF, $VLAN20_IF, $VLAN30_IF, $VLAN40_IF } udp dport 67 accept
    # DHCP replies from router (server -> clients)
    iifname { $VLAN10_IF, $VLAN20_IF, $VLAN30_IF, $VLAN40_IF } udp sport 67 udp dport 68 accept

    # DNS to router itself (if you run DNS on the router)
    # (This matches "traffic coming to the router", not to 10.0.x.1)
    iifname { $VLAN10_IF, $VLAN20_IF, $VLAN30_IF, $VLAN40_IF } udp dport 53 accept
    iifname { $VLAN10_IF, $VLAN20_IF, $VLAN30_IF, $VLAN40_IF } tcp dport 53 accept

    # If ETH is an internal LAN too, keep it here; otherwise delete it:
    # iifname $ETH udp dport 67 accept
    # iifname $ETH udp sport 67 udp dport 68 accept
    # iifname $ETH udp dport 53 accept
    # iifname $ETH tcp dport 53 accept
  }

  chain forward {
    type filter hook forward priority 0;
    policy drop;

    # Allow return traffic for forwarded flows
    ct state { established, related } accept

    ####################
    # Inter VLAN traffic
    ####################

	# Allow pings
	iifname $VLAN30_IF oifname $VLAN40_IF icmp type echo-request accept
	iifname $VLAN40_IF oifname $VLAN30_IF icmp type echo-request accept


    # VLAN10 MGMT-PC -> VLAN20 (allow all to that subnet; you can tighten later)
    iifname $VLAN10_IF oifname $VLAN20_IF ip saddr $MGMT_PC ip daddr $VLAN20_NET ct state new accept

    # VLAN20 HomeAssistant -> VLAN10 Bambulab P2S specific TCP ports
    iifname $VLAN20_IF oifname $VLAN10_IF ip saddr $HA ip daddr $BL_P2S tcp dport { 322, 8883 } ct state new accept

    # VLAN10 MGMT_PC -> VLAN30 ServerToaster + MediaServer + Jelly cockpit
    iifname $VLAN10_IF oifname $VLAN30_IF ip saddr $MGMT_PC ip daddr { $ST_Int, $MEDIASERVER, $JELLY_COCKPIT, $SERVAR } ct state new accept
	

    # VLAN10 MGMT_PC -> NAS (VLAN40)
    define mgmt_ports = { 22, 80, 443, 445, 139, 111, 2049, 1900, 8200, 3000, 30013 }
    iifname $VLAN10_IF oifname $VLAN40_IF ip saddr $MGMT_PC ip daddr $NAS tcp dport $mgmt_ports ct state new accept
	# Alt
	# iifname $VLAN10_IF oifname $VLAN40_IF ip saddr $MGMT_PC ip daddr $NAS_ALT tcp dport $mgmt_ports ct state new accept

    ##### NAS <-> ServerToaster #####
    # ServerToaster (VLAN30) -> NAS (VLAN40) ports
    iifname $VLAN30_IF oifname $VLAN40_IF ip saddr $ST_Int ip daddr $NAS tcp dport { 22, 80, 111, 443, 445, 873, 2049, 3260, 8006, 8080, 8096, 8920, 53418, 5900-5999 } ct state new accept

    
    ################
    # LANs -> Internet
    ################
    iifname { $VLAN10_IF, $VLAN20_IF, $VLAN30_IF, $VLAN40_IF } oifname $WAN_IF ct state new accept
  }

  chain output {
    type filter hook output priority 0;
    policy accept;
  }
}

table ip nat {
	chain postrouting {
		type nat hook postrouting priority 100;
		oifname $WAN_IF ip saddr $VLAN10_NET masquerade
		oifname $WAN_IF ip saddr $VLAN20_NET masquerade
		oifname $WAN_IF ip saddr $VLAN30_NET masquerade 
		oifname $WAN_IF ip saddr $VLAN40_NET masquerade
	}
}

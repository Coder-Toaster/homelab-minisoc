flush ruleset

define ETH = "eth0"
define ETH_NET =  10.0.1.0/24

define WAN       = "enx00e04c680469" 
define VLAN10_IF = "vlan10"    
define VLAN20_IF = "vlan20"
define VLAN30_IF = "vlan30"	
define VLAN40_IF = "vlan40"

###################
# VLAN 10 - Default 
###################
define VLAN10_NET	= 10.0.10.0/24

# Define hosts
define MGMT_PC		= 10.0.10.49
define BL_P2S		= 10.0.10.10

######################
# VLAN 20 - Smart Home
######################
define VLAN20_NET	= 10.0.20.0/27

# Define hosts
define HA			= 10.0.20.10 

####################
# VLAN 30 - Home Lab 
####################
define VLAN30_NET	= 10.0.30.0/28

# Define hosts 
define ST_Int		= 10.0.30.2 # Internal facing network interface
define ST_Pub		= 10.0.30.3 # Public facing network interface


###############
# VLAN 40 - NAS
###############
define VLAN40_NET	= 10.0.40.0/28

# define hosts
define NAS_Int		= 10.0.40.2
define NAS_Pub		= 10.0.40.3
define omv 			= 10.0.40.5 





table inet filter {
  chain input {
    type filter hook input priority 0;
    policy drop;

    # Allow ntop port 
    iifname $VLAN10_IF tcp dport 3000 accept

    iif "lo" accept
    ct state established,related accept
    ip protocol icmp accept

    # SSH only from management (VLAN10)
    iifname $VLAN10_IF tcp dport 22 accept   


    # DHCP Server from Router 
    iifname {$VLAN10_IF, $VLAN20_IF, $VLAN30_IF, $VLAN40_IF} udp dport {67, 68} accept     
    iifname $ETH udp dport {67, 68} accept ###### DELETE THIS

    # DNS Server from router
    iifname $VLAN40_IF ip daddr 10.0.40.1 meta l4proto { tcp, udp } th dport 53 accept
  }

  chain forward {
    type filter hook forward priority 0;
    policy drop;
  
    # Return traffic (including inter vlan)
    ct state established,related accept

    ####################
    # Inter VLAN traffic
    ####################
    # VLAN10 MGMT-PC -> VLAN20
    iifname $VLAN10_IF oifname $VLAN20_IF ip saddr $MGMT_PC ip daddr $VLAN20_NET accept

    # VLAN20 HomeAssistant -> VLAN10 Bambulab P2S
    iifname $VLAN20_IF oifname $VLAN10_IF ip saddr $HA ip daddr $BL_P2S tcp dport {322, 8883}  accept

    # VLAN 10 MGMT_PC -> VLAN30
    iifname $VLAN10_IF oifname $VLAN30_IF ip saddr $MGMT_PC ip daddr $ST_Int accept

    ##### NAS <-> ServerToaster #####
    # ServerToaster (VLAN30) -> NAS (VLAN40)
	iifname $VLAN10_IF oifname $VLAN40_IF ip saddr $MGMT_PC ip daddr $NAS_Int accept
	
    iifname $VLAN30_IF oifname $VLAN40_IF ip saddr $ST_Int ip daddr $NAS_Int ct state new tcp dport { 22, 80, 443, 445, 873, 2049, 3260, 8006, 8080, 8096, 8920, 5900-5999 } accept

    # NAS (VLAN40) -> ServerToaster (VLAN30)
    iifname $VLAN40_IF oifname $VLAN30_IF ip saddr $NAS_Int ip daddr $ST_Int ct state new tcp dport { 22, 80, 443, 445, 873, 2049, 3260, 8006, 8080, 8096, 8920, 5900-5999 } accept

	# omv <-> mgmt pc
	define omv_mgmt_ports = {22,80,443,445,139,111,2049,1900,8200,3000}
	iifname $VLAN10_IF oifname $VLAN40_IF ip saddr $MGMT_PC ip daddr $omv ct state new tcp dport $omv_mgmt_ports accept
	iifname $VLAN40_IF oifname $VLAN10_IF ip saddr $omv ip daddr $MGMT_PC ct state new tcp dport $omv_mgmt_ports accept
	
    ### LANs -> Internet
    iifname $ETH oifname $WAN accept 
    iifname $VLAN10_IF oifname $WAN accept
    iifname $VLAN20_IF oifname $WAN accept
    iifname $VLAN30_IF oifname $WAN accept
    iifname $VLAN40_IF oifname $WAN accept

    ### Apply when hardening ### !!! 
	# Allow Server_Toaster public network card to connect
	# iifname $VLAN30_IF oifname $WAN ip saddr $ST_Pub ct state new accept
	
  
    # return traffic WAN -> VLANs
    iifname $WAN oifname $VLAN10_IF ct state established,related accept
    iifname $WAN oifname $VLAN20_IF ct state established,related accept
    iifname $WAN oifname $VLAN30_IF ct state established,related accept
    iifname $WAN oifname $VLAN40_IF ct state established,related accept
    #iifname $WAN oifname $VLAN30_IF ip daddr 10.0.30.3
    iifname $WAN oifname $ETH ct state established,related accept

    

  }

  chain output {
    type filter hook output priority 0;
    policy accept;
  }
}

table ip nat {
  chain postrouting {
    type nat hook postrouting priority 100;

    oifname $WAN ip saddr $VLAN10_NET masquerade
    oifname $WAN ip saddr $VLAN20_NET masquerade
    oifname $WAN ip saddr $VLAN30_NET masquerade
    oifname $WAN ip saddr $VLAN40_NET masquerade
    oifname $WAN ip saddr $ETH_NET masquerade
  }
}


{
  "Dhcp4": {
    "interfaces-config": {
      "interfaces": ["vlan10", "vlan20" ],
      "dhcp-socket-type": "raw"
    },

    "lease-database": {
      "type": "memfile",
      "persist": true,
      "name": "/var/lib/kea/kea-leases4.csv"
    },

    "valid-lifetime": 600,
    "renew-timer": 300,
    "rebind-timer": 540,

    "authoritative": true,

    "option-data": [
      { "name": "domain-name", "data": "minisoc.local" }
    ],

    "subnet4": [
      {
        "id": 10,
        "subnet": "10.0.10.0/24",
        "pools": [ { "pool": "10.0.10.50 - 10.0.10.100" } ],
        "option-data": [
          { "name": "routers", "data": "10.0.10.1" },
          { "name": "domain-name-servers", "data": "8.8.8.8, 1.1.1.1" }
        ]
      },
      {
        "id": 20,
        "subnet": "10.0.20.0/28",
        "pools": [ { "pool": "10.0.20.10 - 10.0.20.14" } ],
        "option-data": [
          { "name": "routers", "data": "10.0.20.1" },
          { "name": "domain-name-servers", "data": "10.0.10.1" }
        ]
      }
    ],

    "loggers": [
      {
        "name": "kea-dhcp4",
        "output_options": [
          { "output": "stdout" }
        ],
        "severity": "INFO"
      }
    ]
  }
}

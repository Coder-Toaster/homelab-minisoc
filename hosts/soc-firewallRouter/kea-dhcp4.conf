{
  "Dhcp4": {
    "interfaces-config": {
      "interfaces": ["vlan10", "vlan20" ],
      "dhcp-socket-type": "raw"
    },

    "lease-database": {
      "type": "memfile",
      "persist": true,
      "name": "/var/lib/kea/kea-leases4.csv"
    },

    "valid-lifetime": 600,
    "renew-timer": 300,
    "rebind-timer": 540,

    "authoritative": true,

    "option-data": [
      { "name": "domain-name", "data": "minisoc.local" }
    ],

    "subnet4": [
      {
        "id": 10,
        "subnet": "10.0.10.0/24",
        "pools": [ { "pool": "10.0.10.50 - 10.0.10.100" } ],

        "reservations":[
          {
            "hw-address": "60:32:3b:e8:f8:8a", "ip-address": "10.0.10.10", "comment": "3D-Printer"
          },
          {
          	"hw-address": "d8:43:ae:25:1b:72", "ip-address": "10.0.10.49", "comment": "MGMT PC"
          }
		],

        
        "option-data": [
          { "name": "routers", "data": "10.0.10.1" },
          { "name": "domain-name-servers", "data": "8.8.8.8, 1.1.1.1" }
        ]
      },
      {
        "id": 20,
        "subnet": "10.0.20.0/27",
        "pools": [ { "pool": "10.0.20.20 - 10.0.20.31" } ],

        "reservations":[
          {"hw-address": "2c:cf:67:23:4a:0f", "ip-address": "10.0.20.10", "comment": "Home Assistant"},
          {"hw-address": "78:1c:3c:a7:08:8f", "ip-address": "10.0.20.11", "comment": "SLZB Zigbee coordinator"}
          	
        ],
        "option-data": [
          { "name": "routers", "data": "10.0.20.1" },
          { "name": "domain-name-servers", "data": "8.8.8.8, 1.1.1.1" }
        ]
      }
    ],

    "loggers": [
      {
        "name": "kea-dhcp4",
        "output_options": [
          { "output": "stdout" }
        ],
        "severity": "INFO"
      }
    ]
  }
}
